{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white px-4">

    <div class="w-full max-w-4xl text-center">
        <h1 class="text-3xl font-bold text-blue-400">AI Tagging in Progress</h1>
        <p class="text-gray-400 text-sm mt-1">Analysing data row by row and generating AI-assisted outputs.</p>
    </div>

    <!-- Progress bar -->
    <div class="w-full max-w-4xl mt-6">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span id="progress-label">Initialising…</span>
            <span id="progress-pct">0%</span>
        </div>
        <div class="w-full bg-gray-700 rounded-full h-3">
            <div id="progress-bar" class="bg-blue-500 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
    </div>

    <!-- Live log terminal -->
    <div class="w-full max-w-4xl mt-6">
        <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Live Logs</h3>
            <span id="log-count" class="text-xs text-gray-500">0 entries</span>
        </div>
        <div id="log-box"
             class="h-96 overflow-y-auto bg-black rounded-lg border border-gray-700 p-3 font-mono text-xs space-y-2">
            <p id="log-empty" class="text-gray-600">Awaiting first result…</p>
        </div>
    </div>
</div>

<script>
var logsSeen = 0;   // cursor — number of log entries already rendered

function appendLogs(logs) {
    var box   = document.getElementById('log-box');
    var empty = document.getElementById('log-empty');

    logs.forEach(function(log) {
        if (empty) { empty.remove(); empty = null; }

        var entry = document.createElement('div');
        entry.className = 'border-b border-gray-800 pb-2';
        entry.innerHTML =
            '<span class="text-yellow-400 font-bold">[Row ' + log.row_index + '] ' + escHtml(log.column) + '</span><br>' +
            '<span class="text-gray-400"><b>Prompt:</b> '      + escHtml(log.prompt)      + '</span><br>' +
            '<span class="text-green-400"><b>Answer:</b> '     + escHtml(log.best_answer) + '</span><br>' +
            '<span class="text-blue-400"><i>Explanation:</i> ' + escHtml(log.explanation) + '</span>';
        box.appendChild(entry);
    });

    if (logs.length) {
        box.scrollTop = box.scrollHeight;
    }
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function poll() {
    fetch("{% url 'tagging_progress' %}?since=" + logsSeen)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                document.getElementById('progress-label').textContent = data.error;
                setTimeout(poll, 2000);
                return;
            }

            var done  = data.done  || 0;
            var total = data.total || 0;
            var pct   = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-pct').textContent  = pct + '%';
            document.getElementById('progress-label').textContent =
                'Row ' + done + ' of ' + total + ' — ' + data.status;

            if (data.logs && data.logs.length) {
                appendLogs(data.logs);
                logsSeen = data.log_total;
                document.getElementById('log-count').textContent = logsSeen + ' entries';
            }

            if (data.status === 'finished') {
                document.getElementById('progress-label').textContent = 'Done! Redirecting…';
                setTimeout(function() { window.location.href = "{% url 'results' %}"; }, 800);
            } else {
                setTimeout(poll, 1000);
            }
        })
        .catch(function() { setTimeout(poll, 2000); });
}

document.addEventListener('DOMContentLoaded', poll);
</script>
{% endblock %}
