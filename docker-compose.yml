# Both the app and the SD server, on one Docker network. Ollama still runs
# outside this stack (point the UI's Connection Editor at its host/port, e.g.
# "host.docker.internal" to reach one running on this same machine).
#
# Once both containers are up, in the ODT UI's Image Backend page set the
# host to "sd_server" and port "7860" — compose resolves that service name
# on the shared network.
#
# Usage: docker compose up --build
services:
  app:
    build:
      context: ./AthensMT
    ports:
      - "8000:8000"
    volumes:
      - ./AthensMT:/app
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - sd_server

  sd_server:
    build:
      context: ./sd_server
      # args:
      #   TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    ports:
      - "7860:7860"
    volumes:
      - ./sd_server:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  hf_cache:
